services:
  web:
    container_name: ppt-local-test
    image: ppt-local:test
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
        SENTRY_ORG: ${SENTRY_ORG:-yudc}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-ppt-nextjs}
        SENTRY_RELEASE: ${SENTRY_RELEASE}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
        SENTRY_DSN: ${SENTRY_DSN}
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: 3000
      SENTRY_RELEASE: ${SENTRY_RELEASE}
    ports:
      - "3100:3000"
    restart: unless-stopped
